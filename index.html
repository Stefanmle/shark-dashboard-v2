        <h2 style="font-size:1.4rem;color:#fff;margin-top:32px;">Shark Attack Statistics</h2>
        <p>The GSAF dataset contains 6,773 documented shark attack incidents spanning from the early 1900s to the present. These attacks occurred across more than 150 countries and involved dozens of identified shark species. The data reveals important patterns in shark-human interactions over more than a century.</p>

        <h2 style="font-size:1.4rem;color:#fff;margin-top:32px;">Shark Attacks by Country</h2>
        <p>The United States leads in total recorded shark attacks, followed by Australia, South Africa, Brazil, and the Bahamas. Florida, particularly Volusia County, accounts for more shark attacks than any other region in the world. In Australia, New South Wales and Queensland report the highest numbers.</p>

        <h2 style="font-size:1.4rem;color:#fff;margin-top:32px;">Most Dangerous Shark Species</h2>
        <p>The great white shark, tiger shark, and bull shark are the three species most frequently involved in unprovoked attacks on humans. The great white shark (Carcharodon carcharias) accounts for the most recorded fatal attacks. Bull sharks are considered especially dangerous due to their ability to thrive in both salt and freshwater environments.</p>

        <h2 style="font-size:1.4rem;color:#fff;margin-top:32px;">Shark Attack Prevention</h2>
        <p>Reduce your risk of shark encounters by swimming during daylight hours, avoiding murky water, staying in groups, and keeping away from fishing areas. Heed local shark advisories and beach flag warning systems. Statistical risk remains extremely low — you are far more likely to be struck by lightning than bitten by a shark.</p>

        <h2 style="font-size:1.4rem;color:#fff;margin-top:32px;">Frequently Asked Questions</h2>
        <h3 style="color:#2dd4bf;">How many shark attacks happen each year?</h3>

        <h3 style="color:#2dd4bf;">Which country has the most shark attacks?</h3>

        <h3 style="color:#2dd4bf;">What shark species is most dangerous to humans?</h3>
        <p>The great white shark, tiger shark, and bull shark account for the majority of attacks on humans.</p>
